<!DOCTYPE html>

<html lang="en">


<head>

<meta charset="UTF-8">


<meta name="viewport"
content="width=device-width, initial-scale=1.0">


<title>Contact | Portfolio</title>


<meta name="description"
content="Contact form to reach Manaswini.">


<link rel="stylesheet" href="style.css">
</head>
<body>


<header>


<nav aria-label="Contact Navigation">


<a href="index.html">Home</a>

<a href="contact.html">Contact</a>


</nav>
</header>

<main>
<section>
<h1>Contact Me</h1>
<form aria-label="Contact Form">
<label for="name">
Name
</label>
<input 
type="text"
id="name"
name="name"
required
aria-required="true">
<label for="email">
Email
</label>
<input
type="email"
id="email"
name="email"
required
aria-required="true">
<label for="message">
Message
</label>
<textarea
id="message"
name="message"
rows="5"
required>
</textarea>
<button type="submit">
Send Message
</button>
</form>
</section>
</main>
<footer>
<p>
Thank you for visiting.
</p>
</footer>
</body>
</html>
